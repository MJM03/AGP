<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AGP ERP" />
  <meta name="description" content="Demo profesional de AGP ERP" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>AGP ERP</title>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <strong>AGP ERP</strong>
          <span>Centro empresarial</span>
        </div>
      </div>

      <nav class="nav-list" id="navList">
        <button class="nav-item active" data-view="dashboard"><span>⌂</span> Dashboard</button>
        <button class="nav-item" data-view="clients"><span>👥</span> Clientes</button>
        <button class="nav-item" data-view="quotes"><span>🧾</span> Cotizaciones</button>
        <button class="nav-item" data-view="projects"><span>◫</span> Proyectos</button>
        <button class="nav-item" data-view="finance"><span>◉</span> Finanzas</button>
        <button class="nav-item" data-view="activity"><span>↻</span> Actividad</button>
        <button class="nav-item" data-view="settings"><span>⚙</span> Configuración</button>
      </nav>

      <div class="sidebar-card">
        <span class="eyebrow">ESTADO DEL SISTEMA</span>
        <div class="system-status"><i></i> Operativo</div>
        <small>Última sincronización: ahora</small>
      </div>

      <div class="profile-mini">
        <div class="avatar">AM</div>
        <div><strong>Augusto</strong><span>Administrador</span></div>
        <button class="icon-btn" aria-label="Opciones">⋯</button>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main-area">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
        <div class="topbar-title">
          <span id="sectionEyebrow">RESUMEN GENERAL</span>
          <h1 id="sectionTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <label class="search-box">
            <span>⌕</span>
            <input id="globalSearch" placeholder="Buscar cliente, cotización..." />
          </label>
          <button class="icon-btn notification" id="notificationBtn" aria-label="Notificaciones">♢<b>3</b></button>
          <button class="primary-btn" id="quickCreate">＋ Nuevo</button>
        </div>
      </header>

      <section class="content" id="appContent"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header">
        <div><span class="eyebrow">NUEVO REGISTRO</span><h2 id="modalTitle">Crear</h2></div>
        <button class="icon-btn" id="closeModal" aria-label="Cerrar">✕</button>
      </header>
      <form id="recordForm" class="form-grid"></form>
    </section>
  </div>

  <div class="toast" id="toast"></div>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
